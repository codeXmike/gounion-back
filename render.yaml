services:
  - type: web
    name: gounion-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        value: SET_IN_RENDER_DASHBOARD
      - key: JWT_ACCESS_SECRET
        value: SET_IN_RENDER_DASHBOARD
      - key: JWT_REFRESH_SECRET
        value: SET_IN_RENDER_DASHBOARD
      - key: FRONTEND_ORIGINS
        value: https://gounion-frontend.onrender.com
      - key: APP_URL
        value: https://gounion-frontend.onrender.com
      - key: CLOUDINARY_URL
        value: SET_IN_RENDER_DASHBOARD
      - key: SMTP_HOST
        value: SET_IN_RENDER_DASHBOARD
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: SET_IN_RENDER_DASHBOARD
      - key: SMTP_PASS
        value: SET_IN_RENDER_DASHBOARD
      - key: MAIL_FROM
        value: GoUnion <no-reply@gounion.app>
